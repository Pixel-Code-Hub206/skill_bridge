spring.application.name=backend

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/skillbridge}
spring.datasource.username=${DB_USERNAME:skillbridge_user}
spring.datasource.password=${DB_PASSWORD:skillbridge_pass}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgresPlusDialect

# Gemini API Key configuration
# Override in Render dashboard using environment variable GEMINI_API_KEY
ai.api.key=${GEMINI_API_KEY:YOUR_GEMINI_API_KEY_HERE}